server:
  port: 8080

spring:
  application:
    name: agromind-auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/agromind_ai
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

app:
  jwt:
    # 256-bit key for HMAC-SHA256
    secret: ${JWT_SECRET:QWdyb01pbmRBaVN1cGVyU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uUHVycG9zZTIwMjY=}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
